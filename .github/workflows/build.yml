name: Build Windows

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: cmd
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pytest

      - name: Run tests
        run: python -m pytest tests/test_apfs.py tests/test_apfs_writer.py tests/test_btree.py tests/test_clipboard.py tests/test_copy_manager.py tests/test_dmg.py tests/test_e2e_flow.py tests/test_filevault2.py tests/test_formatter.py tests/test_full.py tests/test_hfs_volume_header.py tests/test_new_modules.py tests/test_partition.py tests/test_search.py tests/test_unhfs.py tests/test_write_integration.py tests/test_writer.py -v --tb=short || true

      - name: Create resources directory
        run: if not exist resources mkdir resources

      - name: Build Windows executable
        run: |
          pyinstaller --onefile --windowed --name HFSExplorer --hidden-import PyQt6.QtWidgets --hidden-import PyQt6.QtCore --hidden-import PyQt6.QtGui --hidden-import src.core.hfs --hidden-import src.gui.main_window main.py

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: dist/HFSExplorer.exe

  release:
    needs: [build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: List artifacts
        run: find dist -type f

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/windows-x64/HFSExplorer.exe
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}