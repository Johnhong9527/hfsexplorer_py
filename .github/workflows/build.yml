name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: cmd
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pytest

      - name: Run tests
        run: python -m pytest tests/ -v

      - name: Create resources directory
        run: if not exist resources mkdir resources

      - name: Build Windows executable
        run: |
          pyinstaller --onefile --windowed --name HFSExplorer --hidden-import PyQt6.QtWidgets --hidden-import PyQt6.QtCore --hidden-import PyQt6.QtGui --hidden-import src.core.hfs --hidden-import src.gui.main_window main.py

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: dist/HFSExplorer.exe

  build-linux-x64:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        distro: [ubuntu, fedora, debian, arch]
        include:
          - distro: ubuntu
            image: ubuntu:22.04
            pkg_cmd: apt-get
            py_ver: python3
          - distro: fedora
            image: fedora:39
            pkg_cmd: dnf
            py_ver: python3
          - distro: debian
            image: debian:12
            pkg_cmd: apt-get
            py_ver: python3
          - distro: arch
            image: archlinux:latest
            pkg_cmd: pacman
            py_ver: python
    container:
      image: ${{ matrix.image }}
    steps:
      - name: Install system dependencies (apt)
        if: matrix.pkg_cmd == 'apt-get'
        run: |
          apt-get update
          apt-get install -y python3 python3-pip python3-venv git gcc python3-dev libfuse2 fakeroot

      - name: Install system dependencies (dnf)
        if: matrix.pkg_cmd == 'dnf'
        run: |
          dnf install -y python3 python3-pip git gcc python3-devel fuse-libs rpm-build fakeroot

      - name: Install system dependencies (pacman)
        if: matrix.pkg_cmd == 'pacman'
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm python python-pip git base-devel fuse2 fakeroot

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Python dependencies
        run: |
          ${{ matrix.py_ver }} -m pip install --upgrade pip
          pip3 install -r requirements.txt
          pip3 install pyinstaller pytest

      - name: Run tests
        run: ${{ matrix.py_ver }} -m pytest tests/ -v

      - name: Create resources directory
        run: mkdir -p resources

      - name: Build executable
        run: |
          pyinstaller --onefile --windowed --name HFSExplorer --hidden-import PyQt6.QtWidgets --hidden-import PyQt6.QtCore --hidden-import PyQt6.QtGui --hidden-import src.core.hfs --hidden-import src.gui.main_window main.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64-${{ matrix.distro }}
          path: dist/HFSExplorer

  build-linux-arm64:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        distro: [ubuntu, debian]
        include:
          - distro: ubuntu
            image: arm64v8/ubuntu:22.04
          - distro: debian
            image: arm64v8/debian:12
    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build in container
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.arm64
          platforms: linux/arm64
          push: false
          tags: hfsexplorer-arm64:${{ matrix.distro }}
          build-args: |
            DISTRO=${{ matrix.distro }}

      - name: Extract artifact
        run: |
          docker create --name extract hfsexplorer-arm64:${{ matrix.distro }}
          docker cp extract:/app/dist/HFSExplorer ./HFSExplorer-arm64-${{ matrix.distro }}
          docker rm extract

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-arm64-${{ matrix.distro }}
          path: HFSExplorer-arm64-${{ matrix.distro }}

  create-packages:
    needs: [build-linux-x64]
    runs-on: ubuntu-22.04
    steps:
      - name: Download Ubuntu x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-x64-ubuntu
          path: build/ubuntu-x64

      - name: Download Debian x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-x64-debian
          path: build/debian-x64

      - name: Make executables executable
        run: |
          chmod +x build/ubuntu-x64/HFSExplorer
          chmod +x build/debian-x64/HFSExplorer

      - name: Install packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot

      - name: Create DEB package (Ubuntu)
        run: |
          mkdir -p hfsexplorer_1.0.0_amd64/DEBIAN
          mkdir -p hfsexplorer_1.0.0_amd64/usr/local/bin
          mkdir -p hfsexplorer_1.0.0_amd64/usr/share/applications
          mkdir -p hfsexplorer_1.0.0_amd64/usr/share/icons/hicolor/256x256/apps

          cat > hfsexplorer_1.0.0_amd64/DEBIAN/control << EOF
          Package: hfsexplorer
          Version: 1.0.0
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: HFSExplorer Team
          Description: HFS/HFS+/HFSX File System Browser
           A tool for browsing and extracting HFS/HFS+/HFSX filesystem contents.
           Supports FileVault 2 encryption and read/write operations.
          EOF

          cp build/ubuntu-x64/HFSExplorer hfsexplorer_1.0.0_amd64/usr/local/bin/

          cat > hfsexplorer_1.0.0_amd64/usr/share/applications/hfsexplorer.desktop << EOF
          [Desktop Entry]
          Name=HFSExplorer
          Comment=HFS/HFS+/HFSX File System Browser
          Exec=/usr/local/bin/HFSExplorer
          Icon=hfsexplorer
          Terminal=false
          Type=Application
          Categories=Utility;FileTools;
          EOF

          dpkg-deb --build hfsexplorer_1.0.0_amd64

      - name: Create DEB package (Debian)
        run: |
          mkdir -p hfsexplorer-debian_1.0.0_amd64/DEBIAN
          mkdir -p hfsexplorer-debian_1.0.0_amd64/usr/local/bin

          cat > hfsexplorer-debian_1.0.0_amd64/DEBIAN/control << EOF
          Package: hfsexplorer
          Version: 1.0.0
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: HFSExplorer Team
          Description: HFS/HFS+/HFSX File System Browser
           A tool for browsing and extracting HFS/HFS+/HFSX filesystem contents.
          EOF

          cp build/debian-x64/HFSExplorer hfsexplorer-debian_1.0.0_amd64/usr/local/bin/
          dpkg-deb --build hfsexplorer-debian_1.0.0_amd64

      - name: Create AppImage
        run: |
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps

          cp build/ubuntu-x64/HFSExplorer AppDir/usr/bin/

          cat > AppDir/usr/share/applications/hfsexplorer.desktop << EOF
          [Desktop Entry]
          Name=HFSExplorer
          Comment=HFS/HFS+/HFSX File System Browser
          Exec=HFSExplorer
          Icon=hfsexplorer
          Terminal=false
          Type=Application
          Categories=Utility;FileTools;
          EOF

          cat > AppDir/AppRun << EOF
          #!/bin/bash
          HERE="\$(dirname "\$(readlink -f "\$0")")"
          exec "\$HERE/usr/bin/HFSExplorer" "\$@"
          EOF
          chmod +x AppDir/AppRun

          # Download AppImageTool
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage

          # Create AppImage
          ARCH=x86_64 ./appimagetool-x86_64.AppImage AppDir HFSExplorer-x86_64.AppImage

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: packages
          path: |
            hfsexplorer_1.0.0_amd64.deb
            hfsexplorer-debian_1.0.0_amd64.deb
            HFSExplorer-x86_64.AppImage

  release:
    needs: [build-windows, build-linux-x64, build-linux-arm64, create-packages]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: List artifacts
        run: find dist -type f

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/windows-x64/HFSExplorer.exe
            dist/linux-x64-ubuntu/HFSExplorer
            dist/linux-x64-fedora/HFSExplorer
            dist/linux-x64-debian/HFSExplorer
            dist/linux-x64-arch/HFSExplorer
            dist/linux-arm64-ubuntu/HFSExplorer-arm64-ubuntu
            dist/linux-arm64-debian/HFSExplorer-arm64-debian
            dist/packages/hfsexplorer_1.0.0_amd64.deb
            dist/packages/hfsexplorer-debian_1.0.0_amd64.deb
            dist/packages/HFSExplorer-x86_64.AppImage
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}