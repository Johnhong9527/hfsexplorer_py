name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: cmd
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pytest

      - name: Run tests
        run: python -m pytest tests/ -v

      - name: Create resources directory
        run: if not exist resources mkdir resources

      - name: Build Windows executable
        run: |
          pyinstaller --onefile --windowed --name HFSExplorer --hidden-import PyQt6.QtWidgets --hidden-import PyQt6.QtCore --hidden-import PyQt6.QtGui --hidden-import src.core.hfs --hidden-import src.gui.main_window main.py

      - name: Create portable version
        run: |
          mkdir HFSExplorer-Portable
          copy dist\HFSExplorer.exe HFSExplorer-Portable\
          echo HFSExplorer Portable Version > HFSExplorer-Portable\README.txt

      - name: Install NSIS
        run: |
          choco install nsis -y

      - name: Create NSIS installer
        run: |
          "C:\Program Files (x86)\NSIS\makensis.exe" /NOCD /V3 build\windows\installer.nsi

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            dist/HFSExplorer.exe
            HFSExplorer-Portable/
            build/windows/HFSExplorer-Setup.exe

  build-linux-x64:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        distro: [ubuntu, fedora, debian, arch]
        include:
          - distro: ubuntu
            image: ubuntu:22.04
            pkg_cmd: apt-get
          - distro: fedora
            image: fedora:39
            pkg_cmd: dnf
          - distro: debian
            image: debian:12
            pkg_cmd: apt-get
          - distro: arch
            image: archlinux:latest
            pkg_cmd: pacman
    container:
      image: ${{ matrix.image }}
    steps:
      - name: Install system dependencies (apt)
        if: matrix.pkg_cmd == 'apt-get'
        run: |
          apt-get update
          apt-get install -y python3 python3-pip python3-venv git gcc python3-dev libfuse2 fakeroot

      - name: Install system dependencies (dnf)
        if: matrix.pkg_cmd == 'dnf'
        run: |
          dnf install -y python3 python3-pip git gcc python3-devel fuse-libs rpm-build fakeroot

      - name: Install system dependencies (pacman)
        if: matrix.pkg_cmd == 'pacman'
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm python python-pip git base-devel fuse2 fakeroot python-virtualenv

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Python dependencies (apt)
        if: matrix.pkg_cmd == 'apt-get'
        run: |
          python3 -m venv /opt/venv
          /opt/venv/bin/pip install --upgrade pip
          /opt/venv/bin/pip install -r requirements.txt
          /opt/venv/bin/pip install pyinstaller pytest

      - name: Install Python dependencies (dnf)
        if: matrix.pkg_cmd == 'dnf'
        run: |
          python3 -m pip install --upgrade pip
          pip3 install -r requirements.txt
          pip3 install pyinstaller pytest

      - name: Install Python dependencies (pacman)
        if: matrix.pkg_cmd == 'pacman'
        run: |
          python -m venv /opt/venv
          /opt/venv/bin/pip install --upgrade pip
          /opt/venv/bin/pip install -r requirements.txt
          /opt/venv/bin/pip install pyinstaller pytest

      - name: Run tests (apt)
        if: matrix.pkg_cmd == 'apt-get'
        run: /opt/venv/bin/python -m pytest tests/ -v

      - name: Run tests (dnf)
        if: matrix.pkg_cmd == 'dnf'
        run: python3 -m pytest tests/ -v

      - name: Run tests (pacman)
        if: matrix.pkg_cmd == 'pacman'
        run: /opt/venv/bin/python -m pytest tests/ -v

      - name: Create resources directory
        run: mkdir -p resources

      - name: Build executable (apt)
        if: matrix.pkg_cmd == 'apt-get'
        run: |
          /opt/venv/bin/pyinstaller --onefile --windowed --name HFSExplorer --hidden-import PyQt6.QtWidgets --hidden-import PyQt6.QtCore --hidden-import PyQt6.QtGui --hidden-import src.core.hfs --hidden-import src.gui.main_window main.py

      - name: Build executable (dnf)
        if: matrix.pkg_cmd == 'dnf'
        run: |
          pyinstaller --onefile --windowed --name HFSExplorer --hidden-import PyQt6.QtWidgets --hidden-import PyQt6.QtCore --hidden-import PyQt6.QtGui --hidden-import src.core.hfs --hidden-import src.gui.main_window main.py

      - name: Build executable (pacman)
        if: matrix.pkg_cmd == 'pacman'
        run: |
          /opt/venv/bin/pyinstaller --onefile --windowed --name HFSExplorer --hidden-import PyQt6.QtWidgets --hidden-import PyQt6.QtCore --hidden-import PyQt6.QtGui --hidden-import src.core.hfs --hidden-import src.gui.main_window main.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64-${{ matrix.distro }}
          path: dist/HFSExplorer

  build-linux-arm64:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Ubuntu ARM64
        run: |
          docker buildx build --file Dockerfile.arm64 --build-arg DISTRO=ubuntu --platform linux/arm64 --load --tag hfsexplorer-arm64:ubuntu .

      - name: Build Debian ARM64
        run: |
          docker buildx build --file Dockerfile.arm64 --build-arg DISTRO=debian --platform linux/arm64 --load --tag hfsexplorer-arm64:debian .

      - name: Extract Ubuntu ARM64 artifact
        run: |
          docker create --name extract-ubuntu hfsexplorer-arm64:ubuntu
          docker cp extract-ubuntu:/app/dist/HFSExplorer ./HFSExplorer-arm64-ubuntu
          docker rm extract-ubuntu

      - name: Extract Debian ARM64 artifact
        run: |
          docker create --name extract-debian hfsexplorer-arm64:debian
          docker cp extract-debian:/app/dist/HFSExplorer ./HFSExplorer-arm64-debian
          docker rm extract-debian

      - name: Upload Ubuntu ARM64
        uses: actions/upload-artifact@v4
        with:
          name: linux-arm64-ubuntu
          path: HFSExplorer-arm64-ubuntu

      - name: Upload Debian ARM64
        uses: actions/upload-artifact@v4
        with:
          name: linux-arm64-debian
          path: HFSExplorer-arm64-debian

  create-packages:
    needs: [build-linux-x64, build-linux-arm64]
    runs-on: ubuntu-22.04
    steps:
      - name: Download Ubuntu x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-x64-ubuntu
          path: build/ubuntu-x64

      - name: Download Fedora x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-x64-fedora
          path: build/fedora-x64

      - name: Download Debian x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-x64-debian
          path: build/debian-x64

      - name: Download Arch x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-x64-arch
          path: build/arch-x64

      - name: Download Ubuntu ARM64 artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-arm64-ubuntu
          path: build/ubuntu-arm64

      - name: Download Debian ARM64 artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-arm64-debian
          path: build/debian-arm64

      - name: Make executables executable
        run: |
          chmod +x build/ubuntu-x64/HFSExplorer
          chmod +x build/fedora-x64/HFSExplorer
          chmod +x build/debian-x64/HFSExplorer
          chmod +x build/arch-x64/HFSExplorer
          chmod +x build/ubuntu-arm64/HFSExplorer-arm64-ubuntu
          chmod +x build/debian-arm64/HFSExplorer-arm64-debian

      - name: Install packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot wget rpm

      - name: Create DEB package (Ubuntu x64)
        run: |
          mkdir -p hfsexplorer_1.0.0_amd64/DEBIAN
          mkdir -p hfsexplorer_1.0.0_amd64/usr/local/bin
          mkdir -p hfsexplorer_1.0.0_amd64/usr/share/applications

          cat > hfsexplorer_1.0.0_amd64/DEBIAN/control << 'EOF'
          Package: hfsexplorer
          Version: 1.0.0
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: HFSExplorer Team
          Description: HFS/HFS+/HFSX File System Browser
           A tool for browsing and extracting HFS/HFS+/HFSX filesystem contents.
           Supports FileVault 2 encryption and read/write operations.
          EOF

          cp build/ubuntu-x64/HFSExplorer hfsexplorer_1.0.0_amd64/usr/local/bin/

          cat > hfsexplorer_1.0.0_amd64/usr/share/applications/hfsexplorer.desktop << 'EOF'
          [Desktop Entry]
          Name=HFSExplorer
          Comment=HFS/HFS+/HFSX File System Browser
          Exec=/usr/local/bin/HFSExplorer
          Terminal=false
          Type=Application
          Categories=Utility;FileTools;
          EOF

          dpkg-deb --build hfsexplorer_1.0.0_amd64

      - name: Create DEB package (Debian x64)
        run: |
          mkdir -p hfsexplorer-debian_1.0.0_amd64/DEBIAN
          mkdir -p hfsexplorer-debian_1.0.0_amd64/usr/local/bin

          cat > hfsexplorer-debian_1.0.0_amd64/DEBIAN/control << 'EOF'
          Package: hfsexplorer
          Version: 1.0.0
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: HFSExplorer Team
          Description: HFS/HFS+/HFSX File System Browser
           A tool for browsing and extracting HFS/HFS+/HFSX filesystem contents.
          EOF

          cp build/debian-x64/HFSExplorer hfsexplorer-debian_1.0.0_amd64/usr/local/bin/
          dpkg-deb --build hfsexplorer-debian_1.0.0_amd64

      - name: Create DEB package (Ubuntu ARM64)
        run: |
          mkdir -p hfsexplorer_1.0.0_arm64/DEBIAN
          mkdir -p hfsexplorer_1.0.0_arm64/usr/local/bin

          cat > hfsexplorer_1.0.0_arm64/DEBIAN/control << 'EOF'
          Package: hfsexplorer
          Version: 1.0.0
          Section: utils
          Priority: optional
          Architecture: arm64
          Maintainer: HFSExplorer Team
          Description: HFS/HFS+/HFSX File System Browser
           A tool for browsing and extracting HFS/HFS+/HFSX filesystem contents.
          EOF

          cp build/ubuntu-arm64/HFSExplorer-arm64-ubuntu hfsexplorer_1.0.0_arm64/usr/local/bin/HFSExplorer
          dpkg-deb --build hfsexplorer_1.0.0_arm64

      - name: Create DEB package (Debian ARM64)
        run: |
          mkdir -p hfsexplorer-debian_1.0.0_arm64/DEBIAN
          mkdir -p hfsexplorer-debian_1.0.0_arm64/usr/local/bin

          cat > hfsexplorer-debian_1.0.0_arm64/DEBIAN/control << 'EOF'
          Package: hfsexplorer
          Version: 1.0.0
          Section: utils
          Priority: optional
          Architecture: arm64
          Maintainer: HFSExplorer Team
          Description: HFS/HFS+/HFSX File System Browser
           A tool for browsing and extracting HFS/HFS+/HFSX filesystem contents.
          EOF

          cp build/debian-arm64/HFSExplorer-arm64-debian hfsexplorer-debian_1.0.0_arm64/usr/local/bin/HFSExplorer
          dpkg-deb --build hfsexplorer-debian_1.0.0_arm64

      - name: Create RPM package (Fedora x64)
        run: |
          mkdir -p rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}

          cat > rpmbuild/SPECS/hfsexplorer.spec << 'EOF'
          Name:           hfsexplorer
          Version:        1.0.0
          Release:        1%{?dist}
          Summary:        HFS/HFS+/HFSX File System Browser

          License:        GPLv3
          URL:            https://github.com/Johnhong9527/hfsexplorer_py

          %description
          A tool for browsing and extracting HFS/HFS+/HFSX filesystem contents.
          Supports FileVault 2 encryption and read/write operations.

          %install
          mkdir -p %{buildroot}/usr/local/bin
          cp %{_sourcedir}/HFSExplorer %{buildroot}/usr/local/bin/

          %files
          /usr/local/bin/HFSExplorer

          %changelog
          * $(date "+%a %b %d %Y") HFSExplorer Team
          - Initial release
          EOF

          cp build/fedora-x64/HFSExplorer rpmbuild/SOURCES/
          rpmbuild -ba rpmbuild/SPECS/hfsexplorer.spec

      - name: Create AppImage
        run: |
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications

          cp build/ubuntu-x64/HFSExplorer AppDir/usr/bin/

          cat > AppDir/usr/share/applications/hfsexplorer.desktop << 'EOF'
          [Desktop Entry]
          Name=HFSExplorer
          Comment=HFS/HFS+/HFSX File System Browser
          Exec=HFSExplorer
          Terminal=false
          Type=Application
          Categories=Utility;FileTools;
          EOF

          cat > AppDir/AppRun << 'EOF'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "$0")")"
          exec "$HERE/usr/bin/HFSExplorer" "$@"
          EOF
          chmod +x AppDir/AppRun

          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage

          ARCH=x86_64 ./appimagetool-x86_64.AppImage AppDir HFSExplorer-x86_64.AppImage

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: packages
          path: |
            hfsexplorer_1.0.0_amd64.deb
            hfsexplorer-debian_1.0.0_amd64.deb
            hfsexplorer_1.0.0_arm64.deb
            hfsexplorer-debian_1.0.0_arm64.deb
            rpmbuild/RPMS/x86_64/*.rpm
            HFSExplorer-x86_64.AppImage

  release:
    needs: [build-windows, build-linux-x64, build-linux-arm64, create-packages]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: List artifacts
        run: find dist -type f

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/windows-build/HFSExplorer.exe
            dist/windows-build/HFSExplorer-Setup.exe
            dist/windows-build/HFSExplorer-Portable/HFSExplorer.exe
            dist/linux-x64-ubuntu/HFSExplorer
            dist/linux-x64-fedora/HFSExplorer
            dist/linux-x64-debian/HFSExplorer
            dist/linux-x64-arch/HFSExplorer
            dist/linux-arm64-ubuntu/HFSExplorer-arm64-ubuntu
            dist/linux-arm64-debian/HFSExplorer-arm64-debian
            dist/packages/hfsexplorer_1.0.0_amd64.deb
            dist/packages/hfsexplorer-debian_1.0.0_amd64.deb
            dist/packages/hfsexplorer_1.0.0_arm64.deb
            dist/packages/hfsexplorer-debian_1.0.0_arm64.deb
            dist/packages/*.rpm
            dist/packages/HFSExplorer-x86_64.AppImage
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}